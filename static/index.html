<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Journal</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main id="loginView" class="login-shell" hidden>
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">Private journal</p>
        <h1>The Journal</h1>
        <label>
          Username
          <input id="username" name="username" autocomplete="username" required />
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Sign in</button>
        <p id="loginError" class="error" role="alert"></p>
      </form>
    </main>

    <main id="journalView" class="journal-shell" hidden>
      <header class="topbar">
        <div>
          <p class="eyebrow">The Journal</p>
          <h1 id="todayTitle">Today</h1>
        </div>
        <div class="context-switch" role="group" aria-label="Journal context">
          <button id="personalMode" class="context-option" type="button" data-context="personal">Personal</button>
          <button id="workMode" class="context-option" type="button" data-context="work">Work</button>
        </div>
        <div class="top-actions">
          <span id="saveState" class="save-state">Saved</span>
          <button id="settingsButton" class="ghost" type="button">Password</button>
          <button id="logoutButton" class="ghost" type="button">Sign out</button>
        </div>
      </header>

      <nav class="editor-toolbar" aria-label="Editor tools">
        <button class="tool-button" type="button" data-command="bold" title="Bold" aria-label="Bold">
          <strong>B</strong>
        </button>
        <button class="tool-button" type="button" data-command="italic" title="Italic" aria-label="Italic">
          <em>I</em>
        </button>
        <button class="tool-button" type="button" data-command="underline" title="Underline" aria-label="Underline">
          <span class="underline-icon">U</span>
        </button>
        <button class="tool-button" type="button" data-command="insertUnorderedList" title="Bulleted list" aria-label="Bulleted list">
          &bull;
        </button>
        <button class="tool-button" type="button" data-command="insertOrderedList" title="Numbered list" aria-label="Numbered list">
          1.
        </button>
        <button id="imageButton" class="tool-button" type="button" title="Add image" aria-label="Add image">
          +
        </button>
        <label class="sound-toggle" title="Typewriter sound">
          <input id="soundToggle" type="checkbox" />
          <span class="sound-slider" aria-hidden="true"></span>
          <span class="sound-label">Sound</span>
        </label>
        <input id="imageInput" type="file" accept="image/png,image/jpeg,image/gif,image/webp" hidden />
      </nav>

      <section class="journal-tools" aria-label="Journal retrieval tools">
        <form id="searchForm" class="tool-form">
          <input id="searchInput" type="search" placeholder="Search notes" aria-label="Search notes" />
          <button type="submit">Search</button>
        </form>
        <form id="jumpForm" class="tool-form">
          <input id="jumpDate" type="date" aria-label="Jump to date" />
          <button type="submit">Jump</button>
        </form>
        <form id="exportForm" class="tool-form">
          <input id="exportFrom" type="date" aria-label="Export from date" />
          <input id="exportTo" type="date" aria-label="Export to date" />
          <select id="exportFormat" aria-label="Export format">
            <option value="html">HTML</option>
            <option value="md">Markdown</option>
          </select>
          <button type="submit">Export</button>
        </form>
      </section>

      <section id="resultsPanel" class="results-panel" hidden>
        <div class="results-header">
          <h2 id="resultsTitle">Results</h2>
          <button id="clearResults" class="ghost" type="button">Clear</button>
        </div>
        <div id="resultsList"></div>
      </section>

      <section class="today-sheet" aria-label="Today's journal">
        <p id="contextLabel" class="context-label">Personal Journal</p>
        <label class="tag-row">
          Tags
          <input id="todayTags" placeholder="health, work, idea" />
        </label>
        <div
          id="todayEditor"
          contenteditable="true"
          spellcheck="true"
          data-placeholder="Start writing..."
          aria-label="Today's journal entry"
        ></div>
      </section>

      <section class="history" aria-label="Older notes">
        <h2>Older Notes</h2>
        <div id="olderNotes"></div>
      </section>
    </main>

    <dialog id="passwordDialog">
      <form id="passwordForm" method="dialog" class="dialog-form">
        <h2>Change Password</h2>
        <label>
          Current password
          <input id="currentPassword" type="password" autocomplete="current-password" required />
        </label>
        <label>
          New password
          <input id="newPassword" type="password" autocomplete="new-password" minlength="12" required />
        </label>
        <p id="passwordError" class="error" role="alert"></p>
        <div class="dialog-actions">
          <button id="cancelPassword" class="ghost" type="button">Cancel</button>
          <button type="submit">Update</button>
        </div>
      </form>
      <section class="dialog-section">
        <h2>Backups</h2>
        <div class="backup-actions">
          <button id="downloadBackup" type="button">Download</button>
          <button id="serverBackup" class="ghost" type="button">Server backup</button>
          <button id="restoreBackupButton" class="ghost" type="button">Restore</button>
          <input id="restoreBackupInput" type="file" accept=".zip,application/zip" hidden />
        </div>
        <p id="backupStatus" class="dialog-note"></p>
      </section>
    </dialog>

    <script src="/static/app.js"></script>
  </body>
</html>
